            background: white;

            align-items: center;
            transition: all 0.3s;
            font-weight: 600;
            font-size: 1.15rem;
        }
        
        .faq-question:hover {

            background: #fcfcfc;
        }

            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }
        
        .modal-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 95%;
            max-width: 1000px;
            height: 90vh;
            max-height: 900px;
            background: white;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

            padding: 28px 35px;
            background: linear-gradient(135deg, #1e88e5, #0d47a1);
            color: white;
            border-radius: 16px 16px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;

            font-weight: 600;
            margin: 0;
            flex: 1;
            padding-right: 25px;
            line-height: 1.4;

        .modal-actions {
            display: flex;
            gap: 12px;
        }

            color: white;
            font-size: 1rem;

            align-items: center;
            gap: 8px;
            font-weight: 500;

            background: rgba(255, 255, 255, 0.35);
            transform: translateY(-2px);
        }

            width: 44px;
            height: 44px;
            padding: 0;
            justify-content: center;
            font-size: 1.6rem;
            font-weight: 300;
        }
        
        .modal-body {
            flex: 1;
            padding: 35px;
            overflow-y: auto;
            font-size: 1.15rem;
            line-height: 1.7;
        }

        .modal-body h2 {
            color: #0d47a1;
            margin: 30px 0 20px 0;
            padding-bottom: 12px;
            border-bottom: 3px solid #e3f2fd;
            font-size: 1.8rem;

            line-height: 1.8;
            text-align: left;
        }

            border-radius: 8px;

            font-size: 1.1rem;

            margin: 20px 0 20px 25px;
            padding-left: 20px;

        .modal-body li {
            margin: 12px 0;
            line-height: 1.7;
        }

            border-top: 2px solid #eaeaea;

            padding: 25px;
            margin: 25px 0;
            font-style: italic;
            color: #555;
            border-radius: 0 8px 8px 0;

            border: 2px solid #4caf50;
            border-radius: 10px;
            padding: 30px;
            margin: 30px 0;

            margin: 15px 0;
        }

            color: #d32f2f;
            font-weight: 700;
        }

            font-size: 1rem;

            background-color: #f9f9f9;
        }

            from { opacity: 0; }
            to { opacity: 1; }

            background: #f5f5f5;
            border-radius: 6px;
        }

            background: #b0b0b0;
            border-radius: 6px;
        }
        
        .modal-body::-webkit-scrollbar-thumb:hover {
            background: #909090;
        }

        /* Стили для печати */
        @media print {
            body * {
                visibility: hidden;
            }
            .modal,
            .modal * {
                visibility: visible;
            }
            .modal {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                height: auto;
                background: white;
            }

                width: 100%;
                height: auto;

                left: 0;
                top: 0;

                border-radius: 0;
                max-width: none;
                max-height: none;

            }
            .modal-actions {
                display: none;
            }
            .modal-body {

            }

                font-size: 1.05rem;

                font-size: 1.3rem;
                margin: 20px 0 15px 0;
            }

                font-size: 1.05rem;
            }

            }

                font-size: 1rem;

            }

            }

                font-size: 1.2rem;
            }
            
            .modal-body h2 {
                font-size: 1.4rem;
            }
            
            .modal-body h3 {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
